name: Documentation

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Documentation
    runs-on: macos-15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
      - name: Build DocC documentation
        run: |
          swift package \
            --allow-writing-to-directory ./docs \
            generate-documentation \
            --target VATIdValidator \
            --output-path ./docs \
            --transform-for-static-hosting \
            --hosting-base-path VATIdValidator
      - name: Fix case sensitivity for GitHub Pages
        run: |
          TARGET=VATIdValidator
          TARGET_LOWER=$(echo "$TARGET" | tr '[:upper:]' '[:lower:]')
          if [ "$TARGET" != "$TARGET_LOWER" ]; then
            cp -r "./docs/documentation/$TARGET_LOWER" "./docs/documentation/$TARGET" 2>/dev/null || true
            mkdir -p "./docs/data/documentation"
            cp "./docs/data/documentation/$TARGET_LOWER.json" "./docs/data/documentation/$TARGET.json" 2>/dev/null || true
            if [ -d "./docs/data/documentation/$TARGET_LOWER" ]; then
              cp -r "./docs/data/documentation/$TARGET_LOWER" "./docs/data/documentation/$TARGET" 2>/dev/null || true
            fi
          fi
      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: ./docs

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
